<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440, initial-scale=1">
<title>Gladly Team — HITL + Team Assist Prototype v9</title>
<!--
  v9 — Hoka stories, two flows (per GCL_Live_Service_Demo_-_v9.docx)
  v8 foundation preserved. v9 changes:
   1. Two distinct scenarios on the same UI:
      - Jordan Rivera  → Team Assist demo (agent-driven, AI helps via chips + draft + actions)
      - Rachel Thompson → HITL demo      (AI-driven ask, human approves/modifies)
   2. Both customers are Hoka buyers. No credit-card references anywhere — payments say
      "original payment method."
   3. Default opens on Jordan (Team Assist demo); Rachel is selected by clicking her card.
   4. Team Assist panel now extends full height of the stage; the bottom bar only covers
      list + profile + conversation (narrowed, flush against the panel's left edge).
   5. Two new copilot component types: draft-card (for Jordan's response drafts) and
      action-card (for the 3-step return process with Approve & run).
   6. Scripted multi-turn flow for Jordan's chip presses (catch me up → sentiment → can I
      approve? → draft → warmer → use draft → process return → approve & run).
-->
<style>
  :root {
    --green-400: #009B00;
    --green-500: #007A00;
    --green-100: #D8F4D8;
    --green-50:  #EAF7EA;
    --navy:      #0F203C;
    --red-400:   #D50E0E;
    --red-50:    #FFF0F2;
    --black:     #111111;   /* defaultFontBlack — softer than pure #000 per Gladly system */
    --white:     #FFFFFF;
    --gray-50:   #FAFAFA;
    --gray-100:  #F6F6F6;
    --gray-200:  #F1F1F1;
    --gray-300:  #E3E3E3;
    --gray-400:  #CECECE;
    --gray-500:  #B3B3B3;
    --gray-600:  #919191;
    --gray-700:  #767676;
    --gray-800:  #484848;
    --gray-900:  #1A1A1A;
    --purple-assist: #8C69F0;
    --purple-100:    #F3EFFE;

    --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px; --sp-5: 20px; --sp-6: 24px; --sp-8: 32px;

    --ff: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    --copy:       400 13px/1.62 var(--ff);
    --copy-bold:  700 13px/1.62 var(--ff);
    --copy-sm:    400 12px/1.3 var(--ff);
    --copy-xs:    400 10px/1.3 var(--ff);
    --h3:         700 16px/1 var(--ff);
    --button:     500 13px/1 var(--ff);

    --radius-sm: 4px;
    --radius-md: 8px;
    --radius-pill: 20px;
    --radius-round: 9999px;

    --shadow-sm: 0 2px 8px rgba(0,0,0,.08);
    --shadow-soft: 5px 5px 25px rgba(0,0,0,.15);
  }

  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font: var(--copy);
    color: var(--black);
    background: var(--gray-100);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    min-width: 1440px;
  }
  button{font-family: var(--ff); cursor: pointer; background: none; border: none; color: inherit}
  a{color: var(--green-400); text-decoration: none}

  /* NAV */
  .nav{
    position: relative; height: 56px; background: var(--white);
    box-shadow: var(--shadow-soft);
    display: flex; align-items: center; padding: 0 var(--sp-6);
    z-index: 10;
  }
  .nav-l{display:flex; align-items:center; gap: var(--sp-4); flex: 1}
  .icon-btn{width: 32px; height: 32px; display:inline-flex; align-items:center; justify-content:center; border-radius: var(--radius-round); color: var(--black)}
  .icon-btn:hover{background: var(--gray-100)}
  .home-link{display:flex; align-items:center; gap: var(--sp-2); font: var(--button); color: var(--black)}
  .nav-c{position:absolute; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap: 2px; font: 700 22px/1 var(--ff)}
  .nav-c .plus{color: var(--green-400); font-weight: 700}
  .nav-c .word{color: var(--black); letter-spacing: -.3px}
  .nav-r{display:flex; align-items:center; gap: var(--sp-1); margin-left:auto}
  .tog{width: 32px; height: 32px; border: 1px solid var(--gray-300); border-radius: var(--radius-round); display:inline-flex; align-items:center; justify-content:center; background: var(--white); color: var(--gray-700)}
  .nav-next{background: var(--gray-300); color: var(--gray-500); font: var(--button); padding: 8px 16px; border-radius: var(--radius-pill); margin-left: var(--sp-2)}
  .nav-divider{width:1px; height: 32px; background: var(--gray-300); margin: 0 var(--sp-2)}
  .bell{position: relative}
  .bell .badge{position:absolute; top: -4px; right: -4px; background: var(--red-400); color: #fff; font: 700 9px/1 var(--ff); padding: 2px 5px; border-radius: var(--radius-round); min-width: 16px; text-align:center}
  .nav-av{width:32px; height:32px; border-radius: var(--radius-round); box-shadow: var(--shadow-sm); overflow:hidden; display:flex; align-items:center; justify-content:center; background: #7BB86F; color: #fff; font: 700 11px/1 var(--ff)}

  /* STAGE — flex row, Team Assist panel spans full stage height. Bottom bar narrows. */
  .stage{
    display:flex;
    height: calc(100vh - 56px);
    background: var(--gray-100);
    overflow: hidden;
  }
  .left-zone{
    flex: 1;
    display:flex;
    flex-direction: column;
    min-width: 0;
    overflow: hidden;
  }
  .layout{
    display:flex;
    flex: 1;
    min-height: 0;
    background: var(--gray-100);
    overflow: hidden;
  }
  .col-cl{
    width: 260px; min-width: 260px; background: var(--white);
    border-right: 1px solid var(--gray-200);
    display:flex; flex-direction: column;
    transition: width .2s, min-width .2s;
    overflow: hidden;
  }
  .col-cl.collapsed{ width: 80px; min-width: 80px }
  .col-profile{width: 320px; min-width: 320px; background: var(--gray-100); padding: var(--sp-4); overflow-y: auto; transition: width .2s, min-width .2s, padding .2s}
  .col-conv{flex:1; min-width: 420px; background: var(--gray-100); display:flex; flex-direction: column; overflow: hidden; transition: min-width .2s}
  .col-right{width: 380px; min-width: 380px; display:flex; position: relative; background: var(--white); border-left: 1px solid var(--gray-200); transition: width .2s, min-width .2s}

  /* Panel-weighted default for Needs-input scenarios: list 220 / profile 280 / conv flex / copilot 440 */
  body.panel-weighted .col-cl{width: 220px; min-width: 220px}
  body.panel-weighted .col-profile{width: 280px; min-width: 280px}
  body.panel-weighted .col-right{width: 440px; min-width: 440px}

  /* Focus-copilot: customer list collapses, profile KEEPS visible at 280, copilot grows to 580 */
  body.focus-copilot .col-cl{width: 80px; min-width: 80px}
  body.focus-copilot .col-cl .cl-htitle,
  body.focus-copilot .col-cl .cl-filters,
  body.focus-copilot .col-cl .cle-body{display:none}
  body.focus-copilot .col-profile{width: 280px; min-width: 280px; padding: var(--sp-4); opacity: 1}
  body.focus-copilot .col-conv{min-width: 360px}
  body.focus-copilot .col-right{width: 580px; min-width: 580px}

  /* CUSTOMER LIST */
  .cl-header{
    display:flex; align-items:center; gap: var(--sp-2);
    padding: var(--sp-3) var(--sp-4);
    border-bottom: 1px solid var(--gray-200);
    flex-shrink: 0;
  }
  .cl-htitle{font: 700 13px/1 var(--ff); color: var(--black); flex: 1; display:flex; align-items:center; gap: var(--sp-2)}
  .cl-htitle .count{font: 700 10px/1 var(--ff); background: var(--gray-200); color: var(--gray-700); padding: 3px 6px; border-radius: 10px}
  .cl-toggle{width: 28px; height: 28px; border-radius: 4px; display:flex; align-items:center; justify-content:center; color: var(--gray-700); cursor: pointer}
  .cl-toggle:hover{background: var(--gray-100)}
  .cl-filters{display:flex; gap: var(--sp-1); padding: var(--sp-2) var(--sp-4); border-bottom: 1px solid var(--gray-200); flex-shrink: 0}
  .cl-fil{font: 500 11px/1 var(--ff); padding: 5px 10px; border-radius: var(--radius-pill); border: 1px solid var(--gray-300); background: var(--white); color: var(--black); cursor: pointer}
  .cl-fil.on{background: var(--black); color: #fff; border-color: var(--black)}
  .cl-list{flex: 1; overflow-y: auto}
  .cle-card{display:flex; gap: var(--sp-3); padding: var(--sp-3) var(--sp-4); border-bottom: 1px solid var(--gray-100); cursor: pointer; border-left: 3px solid transparent; position: relative}
  .cle-card:hover{background: var(--gray-50)}
  .cle-card.active{background: var(--green-50); border-left-color: var(--green-400)}
  .cle-left{position: relative; flex-shrink: 0; width: 40px; height: 40px}
  .cle-priority-dot{position: absolute; left: -10px; top: 18px; width: 6px; height: 6px; border-radius: 50%; background: var(--green-400)}
  .cle-av{width: 40px; height: 40px; border-radius: 50%; display:flex; align-items:center; justify-content:center; font: 700 13px/1 var(--ff); color: #fff; box-shadow: var(--shadow-sm); background: var(--gray-600)}
  .cle-type-pip{position: absolute; right: -2px; bottom: -2px; width: 18px; height: 18px; border-radius: 50%; border: 2px solid #fff; display:flex; align-items:center; justify-content:center}
  .cle-type-pip.assist{background: var(--purple-assist); color: #fff}
  .cle-type-pip.chat{background: var(--gray-700); color: #fff}
  .cle-body{flex: 1; min-width: 0}
  .cle-row1{display:flex; align-items:baseline; gap: var(--sp-2)}
  .cle-name{font: var(--copy-bold); color: var(--black); flex:1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis}
  .cle-time{font: var(--copy-sm); color: var(--gray-700); flex-shrink: 0}
  .cle-preview{font: var(--copy); color: var(--gray-700); line-height: 1.4; margin-top: 2px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden}
  .cle-meta-row{display:flex; align-items:center; gap: var(--sp-2); margin-top: 6px}
  .cle-tag{display:inline-flex; align-items:center; gap: 3px; padding: 2px 6px; border-radius: 3px; font: 700 9px/1 var(--ff); letter-spacing: .4px; text-transform: uppercase}
  .cle-tag.assist{background: var(--purple-100); color: var(--purple-assist)}
  .cle-tag.chat{background: var(--gray-200); color: var(--gray-700)}
  .cle-channel{font: var(--copy-sm); color: var(--gray-700)}
  .col-cl.collapsed .cl-header{padding: var(--sp-3) 12px}
  .col-cl.collapsed .cl-htitle{display:none}
  .col-cl.collapsed .cl-filters{display:none}
  .col-cl.collapsed .cle-body{display:none}
  .col-cl.collapsed .cle-card{padding: 8px 12px; border-bottom: none; border-left: none; gap: 0}
  .col-cl.collapsed .cle-card.active{background: var(--green-400); border-radius: var(--radius-sm); margin: 2px 8px; padding: 8px}
  .col-cl.collapsed .cle-card.active .cle-av{box-shadow: 0 0 0 2px #fff}
  .col-cl.collapsed .cle-priority-dot{left: 2px}

  /* PROFILE */
  .profile-card{background: var(--white); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); padding: var(--sp-4); margin-bottom: var(--sp-3)}
  .profile-head{display:flex; align-items:center; gap: var(--sp-3); margin-bottom: var(--sp-3)}
  .profile-av{width: 56px; height: 56px; border-radius: var(--radius-round); color: #fff; display:flex; align-items:center; justify-content:center; font: 700 18px/1 var(--ff); box-shadow: var(--shadow-sm); flex-shrink: 0}
  .profile-name{font: var(--h3); color: var(--black)}
  .profile-dots{margin-left:auto; color: var(--gray-500); font-size: 18px; cursor: pointer; padding: 0 var(--sp-1)}
  .kv{display:flex; justify-content:space-between; padding: var(--sp-1) 0; font: var(--copy)}
  .link-customer{display:flex; align-items:center; gap: var(--sp-2); padding: var(--sp-3) 0 0; font: var(--button); color: var(--green-400); border-top: 1px solid var(--gray-200); margin-top: var(--sp-3); cursor: pointer}
  .link-customer .suggestion-count{margin-left:auto; color: var(--gray-500); font: var(--copy-sm)}
  .sec-title{font: 700 16px/1 var(--ff); color: var(--black); margin-bottom: var(--sp-3); display:flex; align-items:center; justify-content:space-between}
  .sec-title .add{color: var(--gray-500); font-size: 18px; font-weight: 400; cursor: pointer}
  .contact-row{display:flex; align-items:center; gap: var(--sp-3); padding: var(--sp-2) 0; font: var(--copy); color: var(--black)}
  .contact-row .ci{color: var(--gray-500); width: 16px; height: 16px; flex-shrink: 0; display:inline-flex; align-items:center; justify-content:center}
  .contact-row .tag{background: var(--black); color: #fff; font: 700 9px/1 var(--ff); padding: 3px 6px; border-radius: 3px; letter-spacing: .5px}
  .contact-row .tag-grp{margin-left:auto; display:flex; gap: 4px}
  .contact-sub{font: var(--copy-sm); color: var(--gray-700); padding-left: 28px}
  .pref-row{display:flex; padding: 4px 0; font: var(--copy); color: var(--black)}
  .pref-row .pl{color: var(--gray-700); min-width: 140px}
  .order-card{display:flex; align-items:center; gap: var(--sp-3); padding: var(--sp-2) 0}
  .order-thumb{width: 56px; height: 56px; border-radius: var(--radius-sm); background: var(--gray-200); flex-shrink: 0; display:flex; align-items:center; justify-content:center; overflow:hidden}
  .order-info{flex:1}
  .order-info .oid{font: var(--copy); color: var(--black)}
  .order-info .oid a{font-weight: 700}
  .order-info .ometa{font: var(--copy); color: var(--black)}
  .order-chev{color: var(--gray-500); cursor: pointer}
  .conv-row{display:flex; gap: var(--sp-3); padding: var(--sp-2) 0; font: var(--copy); color: var(--black); border-bottom: 1px solid var(--gray-200)}
  .conv-row:last-child{border-bottom: none}
  .conv-row .when{color: var(--gray-700); min-width: 56px}

  /* CONVERSATION */
  .conv-wrap{flex:1; display:flex; flex-direction:column; overflow:hidden}
  .conv-header{background: var(--white); border-bottom: 1px solid var(--gray-200); padding: var(--sp-3) var(--sp-6); text-align: center; font: var(--copy); color: var(--gray-700); position: relative; flex-shrink: 0}
  .conv-header .title{color: var(--black); font-weight: 700}
  .conv-header-right{position:absolute; right: var(--sp-4); top: 50%; transform: translateY(-50%); display:flex; gap: var(--sp-2); color: var(--gray-500)}
  .conv-scroll{flex:1; overflow-y:auto; padding: var(--sp-6) var(--sp-6); background: var(--white)}
  .tl-event{text-align:center; padding: var(--sp-3) 0; font: var(--copy-sm); color: var(--gray-700)}
  .tl-event strong{color: var(--black); font-weight: 700}
  .tl-event a{color: var(--green-400); font-weight: 500}
  .tl-event .check{color: var(--green-400); font-weight: 700; margin-right: 6px}

  /* Activity acknowledgements — outbound-side actions (agent decisions, AI executions).
     Right-aligned like outbound messages, not centered like routing/date dividers. */
  .tl-activity{text-align:right; padding: var(--sp-1) 0; font: var(--copy-sm); color: var(--gray-700)}
  .tl-activity strong{color: var(--black); font-weight: 700}
  .tl-activity a{color: var(--green-400); font-weight: 500}
  .msg-meta{font: var(--copy-sm); color: var(--gray-700); margin-bottom: var(--sp-2); display:flex; align-items:center; gap: 6px}
  .msg-meta.right{justify-content: flex-end}
  .msg-meta .ch-icon{display:inline-flex; align-items:center; justify-content:center; width: 16px; height: 16px; color: var(--gray-600)}
  .msg{display:flex; gap: var(--sp-3); margin-bottom: var(--sp-5); max-width: 82%}
  .msg.outbound{margin-left: auto; flex-direction: row-reverse}
  .msg-av{width: 32px; height: 32px; border-radius: var(--radius-round); display:flex; align-items:center; justify-content:center; font: 700 11px/1 var(--ff); color: #fff; flex-shrink: 0; box-shadow: var(--shadow-sm)}
  .msg-bub{padding: var(--sp-3) var(--sp-4); border-radius: 16px; font: var(--copy); color: var(--black); line-height: 1.62; box-shadow: 0 1px 2px rgba(0,0,0,.04); background: var(--white); border: 1px solid var(--gray-200)}
  .msg-dots{color: var(--gray-500); margin-top: var(--sp-2); cursor: pointer}

  /* BOTTOM BAR */
  .bottom-bar{height: 48px; flex-shrink: 0; background: var(--white); border-top: 1px solid var(--gray-200); display:flex; align-items: center; padding: 0 var(--sp-4); gap: var(--sp-3); position: relative}
  .bb-assigned{display:flex; align-items:center; gap: var(--sp-3); padding-right: var(--sp-4); border-right: 1px solid var(--gray-200); min-width: 260px}
  .bb-inbox{width: 24px; height: 24px; border-radius: var(--radius-round); background: var(--gray-200); display:flex; align-items:center; justify-content:center; color: var(--gray-700)}
  .bb-assigned .at{font: var(--copy-sm); color: var(--black)}
  .bb-assigned .at strong{color: var(--green-400); font-weight: 500; display:block}
  .bb-fab{width: 32px; height: 32px; border-radius: var(--radius-round); background: var(--green-400); color: #fff; display:flex; align-items:center; justify-content:center; font: 700 18px/1 var(--ff)}
  .bb-input{flex: 1; height: 32px; border: 1px solid var(--gray-400); border-radius: var(--radius-sm); padding: 0 var(--sp-3); font: var(--copy-sm); background: var(--white); color: var(--black)}
  .bb-input:focus{outline: none; border-color: var(--green-400)}
  .bb-topic{display:flex; align-items:center; gap: var(--sp-2); padding: 0 var(--sp-3); color: var(--black); font: var(--copy-sm); cursor: pointer}
  .bb-topic .tval{color: var(--green-400)}
  .bb-split{display:flex; background: var(--green-400); border-radius: var(--radius-pill); overflow: hidden; height: 32px}
  .bb-split .bbs-main{padding: 0 var(--sp-4); color: #fff; font: 500 12px/1 var(--ff); display:flex; align-items:center; cursor:pointer}
  .bb-split .bbs-main:hover{background: var(--green-500)}
  .bb-split .bbs-caret{padding: 0 var(--sp-2); border-left: 1px solid rgba(255,255,255,.25); display:flex; align-items:center; color: #fff; cursor: pointer}

  /* COPILOT */
  .rp{display:flex; width: 100%; height: 100%; background: var(--white); border-left: 1px solid var(--gray-200)}
  .rp-gutter{width: 32px; padding: var(--sp-4) 0 var(--sp-6); display:flex; flex-direction:column; align-items: flex-end; gap: var(--sp-1); background: var(--gray-100)}
  .rp-tab{width: 32px; height: 32px; border-radius: 8px 0 0 8px; display:flex; align-items:center; justify-content:center; background: var(--white); color: var(--gray-700); cursor: pointer}
  .rp-tab.active{background: var(--purple-assist); color: #fff}
  .rp-tab.expand{margin-bottom: var(--sp-2); background: var(--white); color: var(--gray-700)}
  .rp-tab.expand:hover{background: var(--gray-200)}
  body.focus-copilot .rp-tab.expand{background: var(--purple-100); color: var(--purple-assist)}
  .rp-body{flex:1; display:flex; flex-direction:column; background: var(--white); overflow: hidden}

  .rp-scroll{flex:1; overflow-y: auto; padding: var(--sp-4) var(--sp-4) var(--sp-2); display:flex; flex-direction: column; gap: var(--sp-4)}

  /* The opening AI message is structurally larger than a chat bubble — it holds
     summary + facts + a minimal "what I'd do" block + the closing question, all as one AI turn. */
  .ai-open{
    display:flex; flex-direction: column; gap: var(--sp-3);
  }
  .ai-open .ao-text{font: var(--copy); color: var(--black); line-height: 1.62}
  .ai-open .ao-text strong{font-weight: 700}
  .ai-open .ao-ask{font: var(--copy-bold); color: var(--black); margin-top: var(--sp-1)}

  /* Facts as prose bullets, not a 2-col attribute table */
  .facts-prose{
    padding: 12px 14px;
    background: var(--gray-50);
    border-radius: var(--radius-md);
  }
  .facts-prose .fp-label{
    font: 700 11px/1 var(--ff);
    color: var(--gray-700);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 8px;
  }
  .facts-prose ul{ list-style: none; padding: 0; margin: 0; }
  .facts-prose li{
    padding: 4px 0 4px 18px;
    position: relative;
    line-height: 1.62;
    color: var(--black);
  }
  .facts-prose li::before{
    content: "•";
    color: var(--green-400);
    position: absolute;
    left: 6px;
    top: 4px;
    font-weight: 700;
  }

  /* Toned-down "what I'd do" block — no border, no icon, no heart.
     Just a thin green left-rule with a small uppercase label and two lines. */
  .rec-lite{
    padding: 6px 0 6px 14px;
    border-left: 3px solid var(--green-400);
    margin: 4px 0;
  }
  .rec-lite .rl-label{
    font: 700 10px/1 var(--ff);
    color: var(--green-400);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .rec-lite .rl-label .pill-modified{
    display: none;
    font: 700 9px/1 var(--ff);
    color: var(--green-400);
    background: var(--green-100);
    padding: 3px 6px;
    border-radius: 10px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }
  .rec-lite .rl-label .pill-modified.on{ display: inline-flex; }
  .rec-lite .rl-title{ font: var(--copy-bold); color: var(--black); margin-bottom: 2px; }
  .rec-lite .rl-line{ font: var(--copy); color: var(--black); line-height: 1.62; }

  /* Draft card — for Team Assist's "here's a response draft" messages (Jordan flow) */
  .draft-card{
    border: 1px dashed var(--gray-400);
    border-radius: var(--radius-md);
    padding: 12px 14px;
    margin-top: 8px;
    background: var(--white);
  }
  .draft-card .dc-label{
    font: 700 10px/1 var(--ff);
    color: var(--gray-700);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .draft-card .dc-body{

    const ch = e.channel === 'email' ? 'sent an email' : 'sent a chat';
    return `<div class="msg-meta"><span class="ch-icon">${chIcon}</span>${e.who} ${ch} — ${e.time}</div>

    factsEl.style.display = '';
    recEl.style.display = '';
    askEl.style.display = '';
    document.getElementById('rp-facts-list').innerHTML = c.factsProse.map(f => `<li>${f}</li>`).join('');
    document.getElementById('rec-title-text').innerHTML = c.rec.title;
    document.getElementById('rec-line1').innerHTML = c.rec.line1;
    document.getElementById('rec-line2').innerHTML = c.rec.line2;
    document.getElementById('pill-modified').classList.remove('on');
    askEl.textContent = c.ask;
  } else {
    factsEl.style.display = 'none';
    recEl.style.display = 'none';
    askEl.style.display = 'none';
  }

  // Citations — support up to 3 (Jordan has 3; Rachel has 2)
  for (let i = 0; i < 3; i++) {
    const popT = document.getElementById(`pop${i + 1}-title`);
    const popB = document.getElementById(`pop${i + 1}-body`);
    if (!popT) continue;
    const cit = c.citations && c.citations[i];
    if (cit) {
      popT.textContent = cit.title;
      popB.textContent = cit.body;
    } else {
      popT.textContent = '';
      popB.textContent = '';
    }
  }

  renderChips(c.chips);
  document.getElementById('chat-msgs').innerHTML = '';
}

function renderChips(chips) {
  document.getElementById('rp-sugs').innerHTML = chips.map((ch, i) =>
    `<button class="chip ${ch.kind || ''}" onclick='handleChip(${i})'>${ch.text}</button>`
  ).join('');
  // stash for lookup
  window._chipBank = chips;
}

function handleChip(i) {
  const ch = window._chipBank[i];
  if (!ch) return;
  pushAgentMsg(ch.text);
  clearChips();
  pushTyping();
  setTimeout(() => {
    removeTyping();
    runDecision(ch.action, ch.arg);
  }, 700);
}

function clearChips() {
  document.getElementById('rp-sugs').innerHTML = '';
}

/* =========================================================================
   DECIDE — all decisions flow through here, no modals
   ========================================================================= */

function runDecision(action, arg) {
  const s = currentScenario();

  // Team Assist scripted flow (Jordan) — route through the script runner
  if (s.copilot && s.copilot.script && s.copilot.script[action]) {
    return runScript(action);
  }

  const handler = s.decisions && s.decisions[action];
  if (!handler) { pushAIMsg("Not sure how to handle that yet."); return; }

  if (action === 'raise' || action === 'lower') {
    const res = handler(session, arg);
    session.creditAmount = arg;
    updateRecCard();
    pushAIMsg(res.copilotReply);
    // Re-ask: show primary Yes + revert chips
    renderChips([
      { text: "Yes, go ahead", kind: 'primary', action: 'approve' },
      { text: `Change my mind`, kind: 'secondary', action: 'revert' },
      { text: "No, I'll take it", kind: 'secondary', action: 'handoff' }
    ]);
    return;
  }

  if (action === 'revert') {
    session.creditAmount = s.copilot.creditDefault;
    updateRecCard(true);
    pushAIMsg(`Back to a $${session.creditAmount} credit. Go?`);
    renderChips([
      { text: "Yes, go ahead", kind: 'primary', action: 'approve' },
      { text: "Bump credit to $50", kind: 'secondary', action: 'raise', arg: 50 },
      { text: "Lower credit to $10", kind: 'secondary', action: 'lower', arg: 10 },
      { text: "No, I'll take it", kind: 'secondary', action: 'handoff' }
    ]);
    return;
  }

  if (action === 'approve') {
    const res = handler(session);
    pushAIMsg(res.copilotReply);

    const tl = document.getElementById('timeline');

    // Chronological: each thing that happened becomes its own plain, right-aligned activity line.
    res.timelineEvents.forEach(text => {
      tl.insertAdjacentHTML('beforeend', `<div class="tl-activity">${text}</div>`);
    });

    // AI's customer-facing reply — clean bubble, no badge.
    const chIcon = res.customerChannel === 'email'
      ? '<svg width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="10" rx="1" stroke="currentColor" stroke-width="1.2"/><path d="M2 4l6 5 6-5" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>'
      : '<svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M2 4a2 2 0 012-2h8a2 2 0 012 2v6a2 2 0 01-2 2H6l-4 3V4z" stroke="currentColor" stroke-width="1.3" fill="none"/></svg>';
    tl.insertAdjacentHTML('beforeend',
      `<div class="msg-meta right">Gladly AI replied — just now<span class="ch-icon">${chIcon}</span></div>
       <div class="msg outbound"><div class="msg-av" style="background:var(--navy)">AI</div><div class="msg-bub">${res.customerReply}</div><span class="msg-dots">⋮</span></div>`);

    session.decided = true;
    document.getElementById('conv-status').textContent = 'Resolved by AI';
    scrollTimeline();
    return;
  }

  if (action === 'handoff') {
    const res = handler(session);
    pushAIMsg(res.copilotReply);
    const tl = document.getElementById('timeline');
    res.timelineEvents.forEach(text => {
      tl.insertAdjacentHTML('beforeend', `<div class="tl-activity">${text}</div>`);
    });
    document.getElementById('conv-status').textContent = 'Handed off to Lisa';
    session.decided = true;
    scrollTimeline();
    return;
  }
}

/* =========================================================================
   TEAM ASSIST SCRIPTED FLOW — Jordan's multi-turn conversation
   ========================================================================= */

function runScript(action) {
  const s = currentScenario();
  const beat = s.copilot.script[action];
  if (!beat) { pushAIMsg("Not sure how to handle that yet."); return; }

  // DRAFT beats: render the draft body AS the AI message (no preface, no outer container).
  // The message gets an inline Use button + feedback icons via pushAIMsg({draft:true}).
  if (beat.draftCard) {
    session.jordanLastDraft = (action === 'warmer') ? 'warmer' : 'draft';
    const body = escapeHtml(beat.draftCard.body).replace(/\n/g, '<br>');
    pushAIMsg(body, { draft: true, useAction: beat.useAction || 'useDraft' });
  } else {
    // Build extra content (action card, product list) + optional followup for non-draft beats
    let extra = '';
    if (beat.productList) extra += renderProductList(beat.productList);
    if (beat.actionCard) {
      extra += renderActionCard(beat.actionCard);
      session.jordanActionCard = beat.actionCard;
    }
    let replyHtml = beat.reply || '';
    if (beat.followup) {
      replyHtml = (replyHtml ? replyHtml + '<br><br>' : '') + beat.followup;
    }
    if (replyHtml || extra) pushAIMsg(replyHtml, { extra });
  }

  // Side effects
  if (beat.sideEffect === 'sendOutboundChat') sideEffectSendOutbound('chat');
  if (beat.sideEffect === 'approveRun')       sideEffectApproveRun();
  if (beat.sideEffect === 'sendOutboundSMS')  sideEffectSendOutboundSMS();

  // Update chip rail for progressive disclosure OR for explicit nextChips
  if (beat.nextChips !== undefined) {
    renderChips(beat.nextChips);
  } else if (beat.unlockChips) {
    const currentChips = window._chipBank || [];
    // Keep the chips not yet clicked this beat and add unlocked ones not already present
    const clickedAction = action;
    const nextChips = currentChips.filter(c => c.action !== clickedAction);
    const scriptDef = s.copilot.script;
    beat.unlockChips.forEach(a => {
      if (!nextChips.find(c => c.action === a)) {
        const chipDef = JORDAN_CHIP_DEFS[a];
        if (chipDef) nextChips.push(chipDef);
      }
    });
    // Always add "Draft a response" if it's an unlock and not yet shown
    if (beat.unlockChips.includes('draft') && !nextChips.find(c => c.action === 'draft')) {
      nextChips.push({ text: "Draft a response", kind: 'primary', action: 'draft' });
    }
    renderChips(nextChips);
  } else {
    renderChips([]); // clear
  }
}

function pushAgentMsg(text) {
  const box = document.getElementById('chat-msgs');
  const el = document.createElement('div');
  el.className = 'cm agent';
  el.innerHTML = `<div class="cb">${escapeHtml(text)}</div>`;

}
function pushAIMsg(text, extraOrOpts) {
  let opts = {};
  if (typeof extraOrOpts === 'string') opts.extra = extraOrOpts;
  else if (extraOrOpts) opts = extraOrOpts;

  const box = document.getElementById('chat-msgs');
  const el = document.createElement('div');
  el.className = 'cm ai';
  const cbClass = opts.draft ? 'cb draft' : 'cb';
  const body = text ? `<div class="${cbClass}">${text}</div>` : '';
  const extra = opts.extra || '';
  // Every streaming AI message gets an inline feedback row; drafts also get a primary Use button.
  const actions = (opts.noActions) ? '' : renderMessageActions(!!opts.draft, opts.useAction || 'useDraft');
  el.innerHTML = body + extra + actions;
  box.appendChild(el);
  scrollRP();
  return el;
}

function renderMessageActions(isDraft, useAction) {
  const useBtn = isDraft
    ? `<button class="cb-use" onclick="onUse(this, '${useAction || 'useDraft'}')">Use</button>`
    : '';
  return `<div class="cb-actions">
    ${useBtn}
    <button class="cb-icon regen" title="Regenerate" onclick="onRegen(this)"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M13.5 8a5.5 5.5 0 11-1.6-3.9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"/><path d="M13.5 2.5v2.5H11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></button>
    <button class="cb-icon copy" title="Copy" onclick="onCopy(this)"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="5" y="3" width="8" height="10" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="3" y="5" width="8" height="10" rx="1" stroke="currentColor" stroke-width="1.3" fill="#fff"/></svg></button>
    <button class="cb-icon thumb up" title="Helpful" onclick="onThumb(this, 'up')"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M4 7v6h7l2-5V6h-4V3a1 1 0 00-2 0l-1 4H4z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round" fill="none"/></svg></button>
    <button class="cb-icon thumb down" title="Not helpful" onclick="onThumb(this, 'down')"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M4 9V3h7l2 5v2h-4v3a1 1 0 01-2 0l-1-4H4z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round" fill="none"/></svg></button>

function onUse(btn, action) {
  const actions = btn.closest('.cb-actions');
  if (actions) actions.remove(); // Use can't be clicked twice
  runScript(action || 'useDraft');
}

function onCopy(btn) {
  const msg = btn.closest('.cm.ai');
  const cb = msg && msg.querySelector('.cb');
  if (!cb) return;
  const text = cb.innerText.replace(/\s+$/, '');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).catch(() => {});
  }
  btn.classList.add('copied');
  showToast('Copied to clipboard');
  setTimeout(() => btn.classList.remove('copied'), 900);
}

function onThumb(btn, dir) {
  const row = btn.closest('.cb-actions');
  if (!row) return;
  const other = row.querySelector(dir === 'up' ? '.thumb.down' : '.thumb.up');
  if (btn.classList.contains('active')) {
    btn.classList.remove('active');
  } else {
    btn.classList.add('active');
    if (other) other.classList.remove('active');
  }
}

function onRegen(btn) {
  // For draft messages, regenerating re-runs the same script beat; otherwise a quick toast.
  const msg = btn.closest('.cm.ai');
  if (msg && msg.querySelector('.cb.draft')) {
    // Find whether this is the first draft or the warmer

/* =========================================================================
   FREE-TEXT INPUT
   ========================================================================= */

function sendMessage() {
  const input = document.getElementById('rp-input');
  const text = input.value.trim();
  if (!text) return;
  pushAgentMsg(text);
  input.value = '';
  autoGrow(input);
  pushTyping();
  setTimeout(() => {
    removeTyping();
    const lc = text.toLowerCase();
    const s = currentScenario();

    // Team Assist scripted flow (Jordan) — phrase → script key
    if (s.copilot.script) {
      if (/catch.*up|summary|summarize|who is/.test(lc))         return runScript('catchMeUp');
      if (/sentiment|feeling|mood|tone/.test(lc))                return runScript('sentiment');
      if (/can i approve|policy|allowed|discretion|can we/.test(lc)) return runScript('canApprove');
      if (/send.*sms|text.*him|send it.*sms/.test(lc))           return runScript('sendRecSMS');
      if (/sms|text message/.test(lc))                           return runScript('draftRecSMS');
      if (/recommend|suggest|product|recovery|for him/.test(lc)) return runScript('recommend');
      if (/warm(er)?|friendl|kind/.test(lc))                     return runScript('warmer');
      if (/^send|use this|use it|send it|send the draft/.test(lc)) return runScript('useDraft');
      if (/process|refund|return|run.*plan/.test(lc))            return runScript('processReturn');
      if (/^(approve|yes|go|do it|run it|approve.*run)/.test(lc)) return runScript('approveRun');
      if (/draft|write|respond/.test(lc))                        return runScript('draft');
      if (/skip|nevermind|no thanks/.test(lc))                   return runScript('skipRec');
      pushAIMsg("Let me know — catch you up, check sentiment, draft a response, or process the return.");
      return;
    }

    // HITL flow (Rachel) — natural-language decision inference
    if (/^yes\b|^yep\b|^yeah\b|^go\b|go ahead|do it|approve/.test(lc)) {
      runDecision('approve'); return;
    }
    if (/^no\b|i'?ll take|let me take|hand off|handoff|take over/.test(lc)) {
      runDecision('handoff'); return;
    }
    const m = lc.match(/\$?(\d+)/);
    if (m && (lc.includes('credit') || lc.includes('$') || lc.includes('loyalty') || lc.includes('bump') || lc.includes('raise') || lc.includes('lower') || lc.includes('drop'))) {
      const n = parseInt(m[1], 10);
      if (n >= 0 && n <= 100) {
        const action = n > session.creditAmount ? 'raise' : 'lower';
        runDecision(action, n);
        return;
      }
    }
    if (lc.includes('policy') || lc.includes('why')) {
      pushAIMsg("Short version: she fits our playbook — clean history, legitimate reason, within our discretion. The citations in the summary have the details.");
      return;
    }
    pushAIMsg("I'd still go with the recommendation as-is. Let me know — yes, no, or adjust the credit.");
  }, 800);
}

function autoGrow(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function togglePop(e, n) {
  e.stopPropagation();
  const pop = document.getElementById('cite-pop-' + n);

  document.querySelectorAll('.cite-pop.open').forEach(p => { if (p !== pop) p.classList.remove('open'); });
  pop.style.left = Math.min(rect.left, window.innerWidth - 300) + 'px';
  pop.style.top = (rect.bottom + 6) + 'px';
  pop.classList.toggle('open');
}
document.addEventListener('click', function(e) {
  if (!e.target.classList.contains('cite')) {
    document.querySelectorAll('.cite-pop.open').forEach(p => p.classList.remove('open'));
  }
});

function showToast(text) {
  const t = document.getElementById('toast');
  t.textContent = text;
  t.classList.add('on');
  clearTimeout(t._tm);
  t._tm = setTimeout(() => t.classList.remove('on'), 2400);
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    document.querySelectorAll('.cite-pop.open').forEach(p => p.classList.remove('open'));
  }
});

/* =========================================================================
   SELECT CUSTOMER
   ========================================================================= */

function selectCustomer(id) {
  const s = CUSTOMERS.find(c => c.id === id);
  if (!s) return;
  if (!s.wired) { showToast(`${s.listCard.name} — this is a demo, only Rachel and Jordan are wired`); return; }

  currentId = id;
  document.querySelectorAll('.cle-card').forEach(el => el.classList.toggle('active', el.dataset.id === id));

  // Panel-weighted layout when a Needs-input customer is selected (copilot is primary surface)
  document.body.classList.toggle('panel-weighted', s.type === 'assist');

  renderProfile(s);
  renderConversation(s);
  renderCopilot(s);
  document.querySelectorAll('.cite-pop.open').forEach(p => p.classList.remove('open'));
}

/* =========================================================================
   BOOT
   ========================================================================= */

renderCustomerList();
selectCustomer('jordan');
</script>
